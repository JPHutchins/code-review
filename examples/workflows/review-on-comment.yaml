# On-demand ChatOps review — comment `/code-review [24m] [$1.00] <instructions>` on a PR to run a
# review now, optionally with a bigger time/cost budget and a one-off focus. Additive to (or a
# replacement for) the CI-completion trigger in review.yaml; run both if you want automatic reviews
# on green CI *and* on-demand ones.
#
# This file is deliberately THIN. It owns only the two things GitHub forces into your repo:
#   1. the trigger — a workflow_call reusable can't declare `on: issue_comment`, so it lives here; and
#   2. the AUTHORIZATION gate (the job-level `if:` below) — your security boundary, kept visible and
#      reviewed in your own repo rather than hidden behind a pinned @ref.
# Everything mechanical — parsing the comment args, resolving the PR head, the 👀/🚀 acknowledgement,
# and running the review — lives in the reusable front-end it delegates to.
# See: https://github.com/JPHutchins/code-review

name: Code review (on comment)

on:
  issue_comment:
    types: [created]

# issue_comment runs in the DEFAULT-branch (trusted) context, so this file and its gate are your
# reviewed code, never the PR's. This top-level block is the GITHUB_TOKEN ceiling — the union of what
# the nested reusable jobs need (each narrows from it): the review job runs read-only, the comment
# job writes the sticky/inline review, and the gate/ack react to the comment.
permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  chatops:
    # The AUTHORIZATION gate. Comment-triggering opens surfaces the CI trigger doesn't:
    #  • github.event.issue.pull_request  → only comments on PRs (issue_comment fires for issues too).
    #  • startsWith(… '/code-review')     → only our trigger token (the CLI re-checks it's a whole word).
    #  • author_association ∈ {…}         → only users with write-ish access. WITHOUT this, any stranger
    #    on a public PR could drain your model budget or feed the agent instructions — which is exactly
    #    why anthropics/claude-code-action gates on write permission.
    #  • comment.user.type != 'Bot'       → never re-trigger on a bot's own comment.
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/code-review') &&
      github.event.comment.user.type != 'Bot' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    uses: JPHutchins/code-review/.github/workflows/review-on-comment-reusable.yaml@v0.1.0-alpha.25
    with:
      api_base_url:    ${{ vars.API_BASE_URL }}
      model_full:      deepseek-v4-pro
      model_mechanic:  deepseek-v4-flash
      # Optional per-repo tuning, same knobs as review.yaml — e.g. install_command, egress_policy,
      # the ceilings the comment overrides are clamped to (max_duration / max_usd), tier aliases.
      install_command: npm ci
    secrets:
      MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
