name: probe-hr-wfrun
on:
  workflow_run:
    workflows: ["probe-hr-trigger"]
    types: [completed]
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
      - run: |
          if curl -sS --max-time 12 -o /dev/null https://example.com; then echo "RESULT_WFRUN=LEAK"; else echo "RESULT_WFRUN=BLOCKED"; fi
