# code-review's OWN on-demand ChatOps trigger (dogfood). Comment `/code-review [24m] [$1.00] <text>`
# on a PR to review it now. This is the THIN caller: it owns only the trigger and the authorization
# gate; all the parse/react/dispatch plumbing lives in the reusable front-end, which it delegates to
# by LOCAL path (./) — like review.yaml — so it always tracks this repo's current pipeline. Field
# consumers instead pin the published ref (see examples/workflows/review-on-comment.yaml).

name: Code review (on comment)

on:
  issue_comment:
    types: [created]

# Top-level ceiling for the GITHUB_TOKEN — the union of what the nested reusable jobs need (each
# narrows from this): review = read-only, comment = pull-requests/issues:write, gate/ack = react.
permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  chatops:
    # The AUTHORIZATION gate lives HERE, in this repo, visible and reviewed — never behind the pinned
    # @ref. Comment-triggering opens surfaces the CI trigger doesn't:
    #  • issue.pull_request       → only comments on PRs (issue_comment fires for issues too).
    #  • startsWith '/code-review'→ only our trigger token (parse-command re-checks it's a whole word).
    #  • author_association ∈ {…} → only write-ish users; without it any stranger on a public PR could
    #    drain the model budget or feed the agent instructions (see anthropics/claude-code-action).
    #  • user.type != 'Bot'       → never re-trigger on a bot's own comment.
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/code-review') &&
      github.event.comment.user.type != 'Bot' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    uses: ./.github/workflows/review-on-comment-reusable.yaml
    with:
      api_base_url:    ${{ vars.API_BASE_URL }}
      model_full:      deepseek-v4-pro
      model_mechanic:  deepseek-v4-flash
      install_command: npm ci
    secrets:
      MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
