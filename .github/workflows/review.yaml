# Code review — code-review's OWN reviewer (dogfood).
# This is the thin consumer form of the packaged pipeline: it keeps the trigger + superset
# permissions + secret, and delegates the whole pipeline to the reusable workflow in this repo.
# We reference it by LOCAL path (./) so our own review always tracks this repo's current reusable
# workflow — no version pin to bump. Field consumers instead pin the published ref, e.g.:
#   uses: JPHutchins/code-review/.github/workflows/review-reusable.yaml@v0.1.0-alpha.22
# The copy-paste single-file variant lives at examples/workflows/review.yaml.
# See: https://github.com/JPHutchins/code-review

name: Code review

on:
  workflow_run:
    workflows: ["CI"]       # our CI workflow name — unmodified
    types: [completed]

# Superset the reusable workflow's two jobs narrow from: review → contents:read (runs untrusted PR
# code), comment → pull-requests/issues:write (no agent). Each internal job's own permissions
# intersect with these, so the boundary is preserved inside the reusable workflow.
permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  review:
    # Only review PRs whose CI concluded (success → full review, failure → mechanic). Skips
    # push-to-main CI runs. The reusable workflow re-checks this defensively.
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'success' ||
       github.event.workflow_run.conclusion == 'failure')
    uses: ./.github/workflows/review-reusable.yaml
    with:
      head_sha:      ${{ github.event.workflow_run.head_sha }}
      head_branch:   ${{ github.event.workflow_run.head_branch }}
      head_repo:     ${{ github.event.workflow_run.head_repository.full_name }}
      run_id:        ${{ github.event.workflow_run.id }}
      conclusion:    ${{ github.event.workflow_run.conclusion }}
      trigger_event: ${{ github.event.workflow_run.event }}
      api_base_url:  ${{ vars.API_BASE_URL }}
      install_command: npm ci     # this repo is node-based; run its checks so the agent can validate
    secrets:
      MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
